name: ci

# Triggers
#  - push:        run on every branch so engineers see feedback before opening a PR.
#  - pull_request:run on PRs into main so review status reflects the latest commit.
#  - workflow_dispatch: lets maintainers re-run manually without a fresh commit.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: reved-backend

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.6,<1.0"
      - name: Run ruff
        # We don't yet have a ruff config in-tree; default rules are
        # E/F/W (pyflakes + pycodestyle). Failing-fast is fine — switch to
        # `ruff check . --select E,F,W,I` once a project config exists.
        run: ruff check .

  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reved
          POSTGRES_PASSWORD: reved
          POSTGRES_DB: reved_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U reved -d reved_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    env:
      ENVIRONMENT: test
      AUTH_ENABLED: "false"
      # Test DB. Tests use `TEST_DATABASE_URL` if set, else `DATABASE_URL`.
      DATABASE_URL: postgresql://reved:reved@localhost:5432/reved_test
      TEST_DATABASE_URL: postgresql://reved:reved@localhost:5432/reved_test
      REDIS_URL: redis://localhost:6379/0
      CACHE_BACKEND: redis
      # Dummy values — required by Settings.validate() but tests mock the clients.
      GROQ_API_KEY: ci-dummy-groq-key
      PINECONE_API_KEY: ci-dummy-pinecone-key
      PINECONE_INDEX_NAME: reved-ci
      PINECONE_DIMENSION: "768"
      HUGGINGFACE_API_KEY: ci-dummy-hf-key
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_JWT_SECRET: ci-dummy-jwt-secret-please-rotate

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run Alembic migrations against test DB
        run: alembic upgrade head
      - name: Run pytest
        run: pytest -q --maxfail=10

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Only push images from main. Other branches just verify the build.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
