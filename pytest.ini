[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
markers =
    db: tests that require a live Postgres connection. Skipped when TEST_DATABASE_URL/DATABASE_URL is unset or unreachable.
    slow: tests that take more than a few seconds. Skipped under -m "not slow".
filterwarnings =
    ignore::DeprecationWarning:passlib.*
    ignore::DeprecationWarning:pydantic.*
